name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore API
        run: dotnet restore ./src/PulseData.API/PulseData.API.csproj

      - name: Restore Tests
        run: dotnet restore ./tests/PulseData.API.Tests/PulseData.API.Tests.csproj

      - name: Build API
        run: dotnet build ./src/PulseData.API/PulseData.API.csproj --configuration Release --no-restore

      - name: Build Tests
        run: dotnet build ./tests/PulseData.API.Tests/PulseData.API.Tests.csproj --configuration Release --no-restore

      - name: Run Health Endpoint Tests
        run: dotnet test ./tests/PulseData.API.Tests/PulseData.API.Tests.csproj --configuration Release --no-build --verbosity normal
